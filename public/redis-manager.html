<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redis Manager - ENSIDE System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }
        .panel {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #e0e0e0;
        }
        .panel h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: monospace;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px 5px 5px 0;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .status {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            color: #c62828;
        }
        .keys-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
        }
        .key-item {
            padding: 8px;
            background: white;
            margin: 5px 0;
            border-radius: 4px;
            cursor: pointer;
            border-left: 3px solid #667eea;
        }
        .key-item:hover { background: #f0f0f0; }
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔴 Redis Manager</h1>
            <p>ENSIDE System - Gerenciador de Banco de Dados Redis</p>
        </div>
        <div class="content">
            <div class="panel">
                <h2>📋 Chaves (Keys)</h2>
                <button onclick="loadKeys()">Carregar Chaves</button>
                <div class="keys-list" id="keysList">Clique em "Carregar Chaves" para começar...</div>
            </div>
            <div class="panel">
                <h2>⚙️ Operações</h2>
                <input type="text" id="keyName" placeholder="Nome da chave">
                <textarea id="keyValue" placeholder="Valor (JSON ou texto)" rows="4"></textarea>
                <button onclick="saveKey()">Salvar</button>
                <button onclick="deleteKey()">Deletar</button>
                <button onclick="getKey()">Obter Valor</button>
            </div>
            <div class="panel">
                <h2>➕ Nova Chave</h2>
                <input type="text" id="newKeyName" placeholder="Nome da chave">
                <textarea id="newKeyValue" placeholder="Valor" rows="4"></textarea>
                <button onclick="addKey()">Adicionar</button>
            </div>
            <div class="panel">
                <h2>ℹ️ Informações</h2>
                <div id="info">Carregando...</div>
                <button onclick="updateInfo()">Atualizar Info</button>
            </div>
            <div class="panel full-width">
                <h2>⚠️ Zona de Perigo</h2>
                <button onclick="flushDB()" style="background: #f44336;">Limpar Banco de Dados</button>
                <div id="messages"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/redis';

        async function loadKeys() {
            try {
                const res = await fetch(`${API_URL}?action=keys`);
                const data = await res.json();
                const list = document.getElementById('keysList');
                list.innerHTML = data.keys.map(k => `<div class="key-item" onclick="selectKey('${k}')">${k}</div>`).join('');
                showMessage(`✓ ${data.total} chaves carregadas`, 'status');
            } catch (e) {
                showMessage(`✗ Erro: ${e.message}`, 'error');
            }
        }

        function selectKey(key) {
            document.getElementById('keyName').value = key;
            getKey();
        }

        async function getKey() {
            const key = document.getElementById('keyName').value;
            if (!key) return showMessage('Digite um nome de chave', 'error');
            try {
                const res = await fetch(`${API_URL}?action=get&key=${key}`);
                const data = await res.json();
                document.getElementById('keyValue').value = data.value || '';
                showMessage(`✓ Chave "${key}" carregada`, 'status');
            } catch (e) {
                showMessage(`✗ Erro: ${e.message}`, 'error');
            }
        }

        async function saveKey() {
            const key = document.getElementById('keyName').value;
            const value = document.getElementById('keyValue').value;
            if (!key || !value) return showMessage('Preencha chave e valor', 'error');
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, value })
                });
                const data = await res.json();
                showMessage(`✓ Chave "${key}" salva com sucesso`, 'status');
            } catch (e) {
                showMessage(`✗ Erro: ${e.message}`, 'error');
            }
        }

        async function deleteKey() {
            const key = document.getElementById('keyName').value;
            if (!key) return showMessage('Digite um nome de chave', 'error');
            if (!confirm(`Tem certeza que deseja deletar "${key}"?`)) return;
            try {
                const res = await fetch(API_URL, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await res.json();
                document.getElementById('keyName').value = '';
                document.getElementById('keyValue').value = '';
                showMessage(`✓ Chave "${key}" deletada`, 'status');
            } catch (e) {
                showMessage(`✗ Erro: ${e.message}`, 'error');
            }
        }

        async function addKey() {
            const key = document.getElementById('newKeyName').value;
            const value = document.getElementById('newKeyValue').value;
            if (!key || !value) return showMessage('Preencha chave e valor', 'error');
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, value })
                });
                const data = await res.json();
                document.getElementById('newKeyName').value = '';
                document.getElementById('newKeyValue').value = '';
                showMessage(`✓ Chave "${key}" adicionada`, 'status');
                loadKeys();
            } catch (e) {
                showMessage(`✗ Erro: ${e.message}`, 'error');
            }
        }

        async function updateInfo() {
            try {
                const res = await fetch(`${API_URL}?action=info`);
                const data = await res.json();
                document.getElementById('info').innerHTML = `
                    <div class="status">
                        <strong>Status:</strong> ✓ Conectado<br>
                        <strong>Porta:</strong> 6380<br>
                        <strong>Total de Chaves:</strong> ${data.keys || 0}<br>
                        <strong>Uptime:</strong> ${data.uptime || 'N/A'}
                    </div>
                `;
            } catch (e) {
                showMessage(`✗ Erro ao carregar info: ${e.message}`, 'error');
            }
        }

        async function flushDB() {
            if (!confirm('⚠️ ATENÇÃO! Isso vai deletar TODOS os dados do Redis. Tem certeza?')) return;
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'flush' })
                });
                const data = await res.json();
                showMessage('✓ Banco de dados limpo', 'status');
                loadKeys();
            } catch (e) {
                showMessage(`✗ Erro: ${e.message}`, 'error');
            }
        }

        function showMessage(msg, type) {
            const div = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = type;
            msgDiv.textContent = msg;
            div.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), 5000);
        }

        // Carregar info ao iniciar
        updateInfo();
    </script>
</body>
</html>
